openapi: "3.0.3"
info:
  title: User Service
  version: "1.1.0"
  description: A simple user management API (v1.1 with additive changes only).

paths:
  /users:
    get:
      operationId: listUsers
      summary: List all users
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: A list of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: createUser
      summary: Create a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserCreate"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}:
    get:
      operationId: getUser
      summary: Get a user by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: A single user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: User not found

  /users/{id}/profile:
    get:
      operationId: getUserProfile
      summary: Get user profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  bio:
                    type: string
                  avatar_url:
                    type: string
                required:
                  - bio

  # NEW endpoint (additive: endpoint_added)
  /users/{id}/settings:
    get:
      operationId: getUserSettings
      summary: Get user settings
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User settings
          content:
            application/json:
              schema:
                type: object
                properties:
                  theme:
                    type: string
                  notifications:
                    type: boolean

components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum:
            - admin
            - user
            - guest
            # NEW enum value (additive: enum_value_added)
            - moderator
        # NEW optional field (additive/safe)
        display_name:
          type: string
      required:
        - id
        - name
        - email

    UserCreate:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
      required:
        - name
        - email
